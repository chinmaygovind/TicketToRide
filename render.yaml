services:
  - type: web
    name: tickettoride
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tickettoride-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: tickettoride-db
    plan: free
