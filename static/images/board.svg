<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 683" width="1024" height="683">
  <defs>
    <!-- Ocean depth: lighter near the US landmass, deep dark at edges -->
    <radialGradient id="ocean-grad" cx="52%" cy="45%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1e5070"/>
      <stop offset="55%"  stop-color="#163d58"/>
      <stop offset="100%" stop-color="#091c2b"/>
    </radialGradient>
    <!-- Subtle wave-line pattern (classic cartographic hatching) -->
    <pattern id="ocean-waves" x="0" y="0" width="14" height="7" patternUnits="userSpaceOnUse">
      <path d="M0,3.5 Q3.5,0 7,3.5 Q10.5,7 14,3.5" fill="none" stroke="#3a8abf" stroke-width="0.45"/>
    </pattern>
    <!-- Parchment gradient for the land: warm northwest → cool southeast -->
    <linearGradient id="land-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e4d3b2"/>
      <stop offset="45%"  stop-color="#dac5a9"/>
      <stop offset="100%" stop-color="#c6af90"/>
    </linearGradient>
    <!-- Drop-shadow cast by land into the ocean (coastal depth) -->
    <filter id="coast-shadow" x="-3%" y="-3%" width="106%" height="106%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#071825" flood-opacity="0.7"/>
    </filter>
    <!-- Edge vignette to make the map feel framed -->
    <radialGradient id="vignette-grad" cx="50%" cy="50%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="55%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.38)"/>
    </radialGradient>
  </defs>
  <!-- Ocean background -->
  <rect width="1024" height="683" fill="url(#ocean-grad)"/>
  <rect width="1024" height="683" fill="url(#ocean-waves)" opacity="0.2"/>
  
